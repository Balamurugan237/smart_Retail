<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Analytics - Smart Retail AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        .chart-card {
            background: var(--surface);
            padding: 2rem;
            border-radius: 1.5rem;
            border: 1px solid var(--border);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }
        .chart-card:hover {
            transform: translateY(-5px);
        }
        .chart-card h3 {
            margin-bottom: 1.5rem;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .chart-card h3::before {
            content: '';
            width: 4px;
            height: 1.25rem;
            background: var(--primary);
            border-radius: 2px;
        }
        .chart-wrapper {
            position: relative;
            height: 350px;
            width: 100%;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">SMART RETAIL AI <span style="font-size: 0.8rem; color: var(--primary); margin-left: 10px;">OWNER PANEL</span></div>
        <div class="nav-links">
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="analytics.html" class="nav-link active">Analytics</a>
            <a href="index.html" class="nav-link" style="color: var(--danger)">Logout</a>
        </div>
    </nav>

    <main>
        <header class="dashboard-header">
            <h1>Sales Performance Analytics</h1>
            <p>Visualizing product success and revenue growth across your shop.</p>
        </header>

        <div class="analytics-grid">
            <!-- Product Sales Chart -->
            <div class="chart-card">
                <h3>Top 10 Products by Revenue</h3>
                <div class="chart-wrapper">
                    <canvas id="productSalesChart"></canvas>
                </div>
            </div>

            <!-- Monthly Sales Trend -->
            <div class="chart-card">
                <h3>Monthly Sales Trends</h3>
                <div class="chart-wrapper">
                    <canvas id="monthlySalesChart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script src="analytics.js"></script>
</body>
</html>
